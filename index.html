<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Diamond Lux Pet Spa in Jacksonville, FL. Luxury, safe, and family-friendly pet grooming at 12276 San Jose Blvd. Book your pet's appointment today!">
    <meta name="keywords" content="pet grooming Jacksonville FL, luxury pet spa Jacksonville, dog grooming, premium pet care, San Jose Blvd pet groomer">
    <title>Diamond Lux Pet Spa | Luxury Pet Grooming in Jacksonville, FL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#000000',
                        white: '#FFFFFF',
                        charcoal: '#2B2B2B',
                        lightGrey: '#F5F5F5',
                        softPink: '#F7C8D8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F5F5F5; scroll-behavior: smooth; color: #2B2B2B; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BUSINESS INFO ---
        const bizInfo = {
            phone: "904-679-2971",
            phoneLink: "tel:9046792971",
            address: "12276 San Jose Blvd suite 713, Jacksonville, FL 32223"
        };

        // --- SERVICES DATA (No Prices, With Live Calendly Links) ---
        const services = [
            { 
                id: 1, 
                name: "Full Luxury Groom", 
                duration: "Approx. 2 Hours", 
                desc: "Premium bath, full haircut, nail grinding, ear cleaning, and a spritz of luxury cologne.", 
                img: "https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&w=500&q=80",
                link: "https://calendly.com/office-diamondluxpetspa/30min" 
            },
            { 
                id: 2, 
                name: "Bath & Brush Spa", 
                duration: "Approx. 1 Hour", 
                desc: "Invigorating massage bath, blow dry, thorough brush out, and nail trim.", 
                img: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&w=500&q=80",
                link: "https://calendly.com/office-diamondluxpetspa/full-luxury-groom-clone" 
            },
            { 
                id: 3, 
                name: "De-shedding Treatment", 
                duration: "Approx. 1.5 Hours", 
                desc: "Specialized shampoo and intense undercoat removal for a cleaner home.", 
                img: "https://images.unsplash.com/photo-1552053831-71594a27632d?auto=format&fit=crop&w=500&q=80",
                link: "https://calendly.com/office-diamondluxpetspa/bath-brush-spa-clone" 
            },
            { 
                id: 4, 
                name: "Puppy's First Spa", 
                duration: "Approx. 45 Mins", 
                desc: "Gentle introduction to grooming with a bath, light trim, and lots of love.", 
                img: "https://images.unsplash.com/photo-1591160690555-5debfba289f0?auto=format&fit=crop&w=500&q=80",
                link: "https://calendly.com/office-diamondluxpetspa/de-shedding-treatment-clone" 
            }
        ];

        // --- COMPONENTS ---

        const UrgencyBanner = () => (
            <div className="bg-softPink text-black text-center py-2 text-sm font-semibold tracking-wide border-b border-pink-300">
                <i className="fa-solid fa-clock mr-2"></i> Limited spots available this week! Book your pet's appointment today.
            </div>
        );

        const Navbar = ({ goToHome, goToServices, goToContact, goToBooking }) => (
            <nav className="sticky top-0 z-50 glass shadow-sm border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between h-20 items-center">
                        <div className="flex items-center cursor-pointer" onClick={goToHome}>
                            <span className="font-serif font-bold text-2xl text-black tracking-wide">
                                Diamond Lux <span className="text-softPink">Pet Spa</span>
                            </span>
                        </div>
                        <div className="hidden md:flex space-x-8">
                            <button onClick={goToHome} className="text-charcoal hover:text-softPink transition font-medium">Home</button>
                            <button onClick={goToServices} className="text-charcoal hover:text-softPink transition font-medium">Services</button>
                            <button onClick={goToContact} className="text-charcoal hover:text-softPink transition font-medium">Contact</button>
                        </div>
                        <div>
                            <button onClick={() => goToBooking()} className="bg-black text-white px-6 py-3 rounded-full font-medium hover:bg-charcoal transition shadow-lg transform hover:-translate-y-0.5 border border-black">
                                Book Now
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        );

        // --- TWO-STEP BOOKING INTEGRATION ---
        const BookingSystem = ({ activeLink, setActiveLink }) => {
            const [selectedService, setSelectedService] = useState(null);
            const [isScheduling, setIsScheduling] = useState(false);

            useEffect(() => {
                if (activeLink) {
                    const svc = services.find(s => s.link === activeLink);
                    if (svc) {
                        setSelectedService(svc);
                        setIsScheduling(true);
                    }
                }
            }, [activeLink]);

            // STEP 2: The Iframe Calendar View
            if (isScheduling && selectedService) {
                return (
                    <div className="max-w-5xl mx-auto py-12 px-4 fade-in">
                        <div className="text-center mb-6 relative">
                            <button onClick={() => { setIsScheduling(false); setActiveLink(null); }} className="absolute left-0 top-2 text-gray-500 hover:text-black font-bold">
                                <i className="fa-solid fa-arrow-left mr-2"></i> Back to Services
                            </button>
                            <h2 className="text-4xl font-serif font-bold text-black mb-2">Schedule: {selectedService.name}</h2>
                            <p className="text-lg text-charcoal">Select a convenient slot on our calendar below.</p>
                        </div>

                        <div className="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden w-full h-[800px]">
                            <iframe 
                                src={selectedService.link} 
                                style={{ width: '100%', height: '100%', border: 'none' }} 
                                title="Appointment Booking">
                            </iframe>
                        </div>
                    </div>
                );
            }

            // STEP 1: Service Selection View
            return (
                <div className="max-w-4xl mx-auto py-12 px-4 fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-4xl font-serif font-bold text-black mb-4">Select a Service</h2>
                        <p className="text-lg text-charcoal">Please choose a service below, then continue to our scheduling calendar.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {services.map(svc => (
                            <div key={svc.id} 
                                 onClick={() => setSelectedService(svc)}
                                 className={`cursor-pointer border-2 rounded-xl p-6 transition-all shadow-sm ${selectedService?.id === svc.id ? 'border-softPink bg-pink-50' : 'bg-white border-lightGrey hover:border-softPink hover:shadow-md'}`}>
                                <h4 className="font-bold text-xl text-black mb-2">{svc.name}</h4>
                                <p className="text-sm text-charcoal mb-4">{svc.desc}</p>
                                <div className="text-xs font-bold text-gray-500 flex items-center">
                                    <i className="fa-regular fa-clock mr-1"></i> {svc.duration}
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="mt-10 flex justify-center fade-in">
                        <button 
                            disabled={!selectedService} 
                            onClick={() => setIsScheduling(true)} 
                            className="bg-black text-white px-10 py-4 rounded-full text-lg font-bold shadow-lg hover:bg-charcoal transition disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-0.5">
                            Continue to Schedule <i className="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- SERVICES PAGE ---
        const ServicesList = ({ goToBooking }) => (
            <div className="max-w-7xl mx-auto py-16 px-4 fade-in">
                <div className="text-center mb-16">
                    <h1 className="text-5xl font-serif font-bold text-black mb-4">Our Luxury Services</h1>
                    <p className="text-xl text-charcoal max-w-2xl mx-auto">Every pet receives a customized, stress-free spa experience. Browse our signature services below.</p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                    {services.map(svc => (
                        <div key={svc.id} className="bg-white rounded-2xl overflow-hidden shadow-lg border border-gray-100 flex flex-col sm:flex-row hover:shadow-xl transition-shadow">
                            <div className="sm:w-2/5 h-48 sm:h-auto">
                                <img src={svc.img} alt={svc.name} className="w-full h-full object-cover" />
                            </div>
                            <div className="p-6 sm:w-3/5 flex flex-col justify-between">
                                <div>
                                    <h3 className="text-2xl font-bold text-black mb-2">{svc.name}</h3>
                                    <p className="text-sm font-semibold text-gray-500 mb-3"><i className="fa-regular fa-clock mr-1"></i> {svc.duration}</p>
                                    <p className="text-charcoal mb-4">{svc.desc}</p>
                                </div>
                                <button onClick={() => goToBooking(svc.link)} className="text-left font-bold text-black hover:text-softPink transition group w-fit">
                                    Book this service <i className="fa-solid fa-arrow-right ml-1 transform group-hover:translate-x-1 transition"></i>
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Home = ({ goToBooking, goToServices }) => (
            <div className="fade-in">
                <header className="relative bg-black">
                    <div className="absolute inset-0">
                        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&q=80&w=2000" alt="Luxury Dog Grooming" className="w-full h-full object-cover opacity-50 grayscale hover:grayscale-0 transition duration-1000" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    </div>
                    <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-32 md:py-48 flex flex-col items-center text-center">
                        <span className="bg-softPink text-black px-4 py-1 rounded-full font-semibold tracking-widest uppercase mb-6 text-xs md:text-sm shadow-sm">Jacksonville's Premier Pet Spa</span>
                        <h1 className="text-5xl md:text-7xl font-serif font-bold text-white mb-6 leading-tight drop-shadow-lg">
                            Luxury Grooming for <br/>Pets That Deserve the Best
                        </h1>
                        <p className="text-lg md:text-xl text-lightGrey mb-10 max-w-2xl drop-shadow">
                            Experience a stress-free, exceptionally clean, and family-friendly spa day for your furry companion. Safety and premium care guaranteed.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={() => goToBooking()} className="bg-softPink text-black px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-300 transition shadow-xl transform hover:-translate-y-1">
                                Book Appointment
                            </button>
                            <button onClick={() => goToServices()} className="bg-transparent border-2 border-white text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-white hover:text-black transition">
                                View Services
                            </button>
                        </div>
                    </div>
                </header>

                <div className="bg-white border-b border-gray-200 py-8">
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-6 text-center divide-x divide-gray-100">
                        <div><i className="fa-solid fa-shield-dog text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">Safe & Certified</p></div>
                        <div><i className="fa-solid fa-heart text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">Stress-Free Care</p></div>
                        <div><i className="fa-solid fa-star text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">100+ Happy Clients</p></div>
                        <div><i className="fa-solid fa-spray-can-sparkles text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">Premium Products</p></div>
                    </div>
                </div>

                <section className="bg-black py-24 text-center px-4">
                    <h2 className="text-4xl md:text-5xl font-serif font-bold text-white mb-6">Treat Your Pet to Luxury Today</h2>
                    <p className="text-lightGrey mb-10 max-w-xl mx-auto text-lg">Join the Diamond Lux family and give your pet the safe, premium grooming experience they deserve.</p>
                    <button onClick={() => goToBooking()} className="bg-softPink text-black px-10 py-4 rounded-full font-bold text-lg hover:bg-pink-300 transition shadow-xl transform hover:-translate-y-1">
                        Book Your Pet's Appointment
                    </button>
                </section>
            </div>
        );

        const Contact = ({ goToBooking }) => (
            <div className="pt-16 pb-32 max-w-7xl mx-auto px-4 fade-in min-h-[70vh]">
                <div className="text-center mb-16">
                    <h1 className="text-5xl font-serif font-bold text-black mb-4">Contact & Location</h1>
                    <p className="text-xl text-charcoal">We look forward to pampering your pet.</p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 bg-white p-8 md:p-12 rounded-3xl shadow-lg border border-gray-100">
                    <div>
                        <h3 className="text-2xl font-serif font-bold text-black mb-6">Visit Our Spa</h3>
                        <div className="space-y-6">
                            <div className="flex items-start">
                                <div className="bg-pink-50 p-3 rounded-full text-softPink mr-4">
                                    <i className="fa-solid fa-location-dot text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-black text-lg">Address</h4>
                                    <p className="text-charcoal mt-1">12276 San Jose Blvd suite 713<br/>Jacksonville, FL 32223</p>
                                </div>
                            </div>
                            
                            <div className="flex items-start">
                                <div className="bg-pink-50 p-3 rounded-full text-softPink mr-4">
                                    <i className="fa-solid fa-phone text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-black text-lg">Phone</h4>
                                    <a href={bizInfo.phoneLink} className="text-charcoal mt-1 hover:text-softPink transition inline-block">{bizInfo.phone}</a>
                                </div>
                            </div>

                            <div className="flex items-start">
                                <div className="bg-pink-50 p-3 rounded-full text-softPink mr-4">
                                    <i className="fa-solid fa-clock text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-black text-lg">Business Hours</h4>
                                    <ul className="text-charcoal mt-1 space-y-1">
                                        <li><span className="font-semibold w-24 inline-block">Tue - Sat:</span> 8:30 AM – 11:00 AM</li>
                                        <li><span className="w-24 inline-block"></span> 2:00 PM – 4:00 PM</li>
                                        <li className="text-softPink font-semibold mt-2">Sun & Mon: Closed</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={() => goToBooking()} className="mt-10 bg-black text-white px-8 py-4 rounded-full font-bold hover:bg-charcoal transition w-full md:w-auto shadow-md">
                            Book an Appointment
                        </button>
                    </div>
                    
                    <div className="bg-lightGrey rounded-2xl overflow-hidden h-64 md:h-full min-h-[300px] border border-gray-200">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3450.4571991864115!2d-81.6263435848827!3d30.13840748184784!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88e5cf5ec79a11a9%3A0x6e9f225eb5782782!2s12276%20San%20Jose%20Blvd%20Suite%20713%2C%20Jacksonville%2C%20FL%2032223!5e0!3m2!1sen!2sus!4v1698249000000!5m2!1sen!2sus" 
                            width="100%" 
                            height="100%" 
                            style={{border:0}} 
                            allowFullScreen="" 
                            loading="lazy" 
                            referrerPolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>
            </div>
        );

        const Footer = () => (
            <footer className="bg-black text-lightGrey py-16 border-t-4 border-softPink">
                <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-10">
                    <div>
                        <div className="flex items-center mb-6">
                            <span className="font-serif font-bold text-2xl text-white tracking-wide">
                                Diamond Lux <span className="text-softPink">Pet Spa</span>
                            </span>
                        </div>
                        <p className="text-sm text-gray-400 leading-relaxed">Jacksonville's premier luxury pet spa, dedicated to safe, clean, and premium care for your furry family members.</p>
                    </div>
                    <div>
                        <h4 className="text-white font-bold mb-6 uppercase text-sm tracking-wider">Contact Us</h4>
                        <ul className="space-y-3 text-sm text-gray-400">
                            <li><i className="fa-solid fa-phone mr-2 text-softPink"></i> <a href={bizInfo.phoneLink} className="hover:text-white transition">{bizInfo.phone}</a></li>
                            <li className="leading-relaxed"><i className="fa-solid fa-location-dot mr-2 text-softPink"></i> {bizInfo.address}</li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="text-white font-bold mb-6 uppercase text-sm tracking-wider">Hours</h4>
                        <ul className="space-y-3 text-sm text-gray-400">
                            <li><span className="text-white font-semibold">Tue - Sat:</span><br/>8:30 AM - 11:00 AM<br/>2:00 PM - 4:00 PM</li>
                            <li><span className="text-softPink font-semibold">Sun & Mon:</span> Closed</li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="text-white font-bold mb-6 uppercase text-sm tracking-wider">Follow Us</h4>
                        <div className="flex space-x-4">
                            <a href="#" className="w-10 h-10 bg-charcoal rounded-full flex items-center justify-center text-white hover:bg-softPink hover:text-black transition"><i className="fa-brands fa-instagram"></i></a>
                            <a href="#" className="w-10 h-10 bg-charcoal rounded-full flex items-center justify-center text-white hover:bg-softPink hover:text-black transition"><i className="fa-brands fa-facebook"></i></a>
                            <a href="#" className="w-10 h-10 bg-charcoal rounded-full flex items-center justify-center text-white hover:bg-softPink hover:text-black transition"><i className="fa-brands fa-tiktok"></i></a>
                        </div>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 mt-12 pt-8 border-t border-gray-800 text-sm text-center text-gray-500">
                    © {new Date().getFullYear()} Diamond Lux Pet Spa. Designed for Conversion. SEO: Pet Grooming Jacksonville FL.
                </div>
            </footer>
        );

        const App = () => {
            const [view, setView] = useState('home');
            const [activeLink, setActiveLink] = useState(null);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [view]);

            const goToHome = () => { setActiveLink(null); setView('home'); };
            const goToServices = () => { setActiveLink(null); setView('services'); };
            const goToContact = () => { setActiveLink(null); setView('contact'); };
            
            const goToBooking = (link = null) => { 
                setActiveLink(link); 
                setView('booking'); 
            };

            return (
                <div className="font-sans text-charcoal flex flex-col min-h-screen">
                    <UrgencyBanner />
                    <Navbar goToHome={goToHome} goToServices={goToServices} goToContact={goToContact} goToBooking={goToBooking} />
                    
                    <main className="flex-grow">
                        {view === 'home' && <Home goToBooking={goToBooking} goToServices={goToServices} />}
                        {view === 'booking' && <BookingSystem activeLink={activeLink} setActiveLink={setActiveLink} />}
                        {view === 'contact' && <Contact goToBooking={goToBooking} />}
                        {view === 'services' && <ServicesList goToBooking={goToBooking} />}
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
