<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Diamond Lux Pet Spa in Jacksonville, FL. Luxury, safe, and family-friendly pet grooming at 12276 San Jose Blvd. Book your pet's appointment today!">
    <meta name="keywords" content="pet grooming Jacksonville FL, luxury pet spa Jacksonville, dog grooming, premium pet care, San Jose Blvd pet groomer">
    <title>Diamond Lux Pet Spa | Luxury Pet Grooming in Jacksonville, FL</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#000000',
                        white: '#FFFFFF',
                        charcoal: '#2B2B2B',
                        lightGrey: '#F5F5F5',
                        softPink: '#F7C8D8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F5F5F5; scroll-behavior: smooth; color: #2B2B2B; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        /* CSS trick to make white-background logos transparent on light backgrounds */
        .logo-blend { mix-blend-mode: multiply; } 
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- BUSINESS INFO ---
        const bizInfo = {
            phone: "904-679-2971",
            phoneLink: "tel:9046792971",
            address: "12276 San Jose Blvd suite 713, Jacksonville, FL 32223",
            logoPath: "/mnt/data/diamondluxlogo.png" // Exact path requested
        };

        // --- DATA ---
        const services = [
            { id: 1, name: "Full Luxury Groom", price: 95, duration: 120, desc: "Premium bath, full haircut, nail grinding, ear cleaning, and a spritz of luxury cologne.", img: "https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&w=500&q=80" },
            { id: 2, name: "Bath & Brush Spa", price: 55, duration: 60, desc: "Invigorating massage bath, blow dry, thorough brush out, and nail trim.", img: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&w=500&q=80" },
            { id: 3, name: "De-shedding Treatment", price: 75, duration: 90, desc: "Specialized shampoo and intense undercoat removal for a cleaner home.", img: "https://images.unsplash.com/photo-1537151608804-ea6d11542123?auto=format&fit=crop&w=500&q=80" },
            { id: 4, name: "Puppy's First Spa", price: 45, duration: 45, desc: "Gentle introduction to grooming with a bath, light trim, and lots of love.", img: "https://images.unsplash.com/photo-1591160690555-5debfba289f0?auto=format&fit=crop&w=500&q=80" }
        ];

        const addOns = [
            { id: 'teeth', name: "Teeth Brushing & Breath Spray", price: 15 },
            { id: 'blueberry', name: "Blueberry Facial Scrub", price: 10 },
            { id: 'paw', name: "Paw Balm Treatment", price: 10 }
        ];

        // --- DATE & TIME LOGIC (STRICT ENFORCEMENT) ---
        const generateAvailableDates = () => {
            const dates = [];
            let curr = new Date();
            // Get next 14 valid booking days
            while(dates.length < 14) {
                curr.setDate(curr.getDate() + 1);
                let dayOfWeek = curr.getDay();
                // 0 = Sunday, 1 = Monday. MUST BE CLOSED.
                if(dayOfWeek !== 0 && dayOfWeek !== 1) {
                    dates.push(curr.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }));
                }
            }
            return dates;
        };

        const generateAvailableTimes = () => {
            const times = [];
            // Morning: 8:30 AM - 11:00 AM (15 min increments)
            let mHour = 8, mMin = 30;
            while(mHour < 11 || (mHour === 11 && mMin === 0)) {
                let formatted = `${mHour}:${mMin === 0 ? '00' : mMin} AM`;
                times.push(formatted);
                mMin += 15;
                if(mMin === 60) { mHour++; mMin = 0; }
            }
            // Afternoon: 2:00 PM - 4:00 PM (15 min increments)
            let aHour = 2, aMin = 0;
            while(aHour < 4 || (aHour === 4 && aMin === 0)) {
                let formatted = `${aHour}:${aMin === 0 ? '00' : aMin} PM`;
                times.push(formatted);
                aMin += 15;
                if(aMin === 60) { aHour++; aMin = 0; }
            }
            return times;
        };

        // --- COMPONENTS ---

        const UrgencyBanner = () => (
            <div className="bg-softPink text-black text-center py-2 text-sm font-semibold tracking-wide border-b border-pink-300">
                <i className="fa-solid fa-clock mr-2"></i> Limited spots available this week! Book your pet's appointment today.
            </div>
        );

        const Navbar = ({ setView }) => (
            <nav className="sticky top-0 z-50 glass shadow-sm border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between h-20 items-center">
                        <div className="flex items-center cursor-pointer" onClick={() => setView('home')}>
                            {/* Logo Implementation */}
                            <div className="h-14 w-auto flex items-center justify-center bg-white rounded">
                                <img src={bizInfo.logoPath} alt="Diamond Lux Logo" 
                                     className="h-12 object-contain logo-blend" 
                                     onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                                {/* Fallback text if image path is broken locally */}
                                <span style={{display: 'none'}} className="font-serif font-bold text-xl text-black tracking-wide">Diamond Lux</span>
                            </div>
                        </div>
                        <div className="hidden md:flex space-x-8">
                            <button onClick={() => setView('home')} className="text-charcoal hover:text-softPink transition font-medium">Home</button>
                            <button onClick={() => setView('services')} className="text-charcoal hover:text-softPink transition font-medium">Services</button>
                            <button onClick={() => setView('gallery')} className="text-charcoal hover:text-softPink transition font-medium">Gallery</button>
                            <button onClick={() => setView('contact')} className="text-charcoal hover:text-softPink transition font-medium">Contact</button>
                        </div>
                        <div>
                            <button onClick={() => setView('booking')} className="bg-black text-white px-6 py-3 rounded-full font-medium hover:bg-charcoal transition shadow-lg transform hover:-translate-y-0.5 border border-black">
                                Book Now
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        );

        // --- BOOKING SYSTEM WIZARD ---
        const BookingSystem = () => {
            const [step, setStep] = useState(1);
            const [selectedService, setSelectedService] = useState(null);
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedAddOns, setSelectedAddOns] = useState([]);
            
            const dates = useMemo(() => generateAvailableDates(), []);
            const times = useMemo(() => generateAvailableTimes(), []);

            const handleAddOnToggle = (id) => {
                setSelectedAddOns(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
            };

            const calculateTotal = () => {
                let total = selectedService ? selectedService.price : 0;
                selectedAddOns.forEach(id => {
                    total += addOns.find(a => a.id === id).price;
                });
                return total;
            };

            const depositAmount = (calculateTotal() * 0.30).toFixed(2);

            return (
                <div className="max-w-4xl mx-auto py-12 px-4 fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-4xl font-serif font-bold text-black mb-4">Book an Appointment</h2>
                        <div className="flex justify-center items-center space-x-4 text-sm font-medium text-gray-500">
                            <span className={step >= 1 ? "text-black font-bold" : ""}>1. Service</span>
                            <i className="fa-solid fa-chevron-right text-xs"></i>
                            <span className={step >= 2 ? "text-black font-bold" : ""}>2. Date & Time</span>
                            <i className="fa-solid fa-chevron-right text-xs"></i>
                            <span className={step >= 3 ? "text-black font-bold" : ""}>3. Details & Deposit</span>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100">
                        {/* STEP 1: SERVICE */}
                        {step === 1 && (
                            <div className="fade-in">
                                <h3 className="text-2xl font-serif mb-6 text-black">Select a Service</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {services.map(svc => (
                                        <div key={svc.id} 
                                             onClick={() => setSelectedService(svc)}
                                             className={`cursor-pointer border-2 rounded-xl p-4 transition-all ${selectedService?.id === svc.id ? 'border-softPink bg-pink-50' : 'border-lightGrey hover:border-softPink'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-bold text-lg text-black">{svc.name}</h4>
                                                <span className="bg-softPink text-black px-3 py-1 rounded-full text-sm font-semibold">${svc.price}+</span>
                                            </div>
                                            <p className="text-sm text-charcoal mb-3">{svc.desc}</p>
                                            <div className="text-xs text-gray-500 flex items-center">
                                                <i className="fa-regular fa-clock mr-1"></i> {svc.duration} mins
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-8 flex justify-end">
                                    <button disabled={!selectedService} onClick={() => setStep(2)} className="bg-black text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-charcoal transition disabled:opacity-50 disabled:cursor-not-allowed">
                                        Continue to Schedule <i className="fa-solid fa-arrow-right ml-2"></i>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: DATE & TIME */}
                        {step === 2 && (
                            <div className="fade-in">
                                <h3 className="text-2xl font-serif mb-2 text-black">Select Date & Time</h3>
                                <p className="text-sm text-gray-500 mb-6"><i className="fa-solid fa-circle-info mr-1"></i> We are open Tue-Sat (Closed Sun & Mon).</p>
                                
                                <label className="block text-sm font-semibold text-charcoal mb-2">Available Dates</label>
                                <div className="flex overflow-x-auto space-x-3 pb-4 hide-scrollbar">
                                    {dates.map(date => (
                                        <div key={date} onClick={() => setSelectedDate(date)} 
                                             className={`flex-shrink-0 cursor-pointer px-6 py-4 rounded-xl border-2 text-center min-w-[120px] transition-all ${selectedDate === date ? 'border-softPink bg-pink-50 text-black font-bold' : 'border-lightGrey text-charcoal hover:border-softPink'}`}>
                                            {date}
                                        </div>
                                    ))}
                                </div>

                                {selectedDate && (
                                    <div className="mt-6 fade-in">
                                        <label className="block text-sm font-semibold text-charcoal mb-2">Available Times for {selectedDate}</label>
                                        <div className="grid grid-cols-3 md:grid-cols-5 gap-3">
                                            {times.map(time => (
                                                <div key={time} onClick={() => setSelectedTime(time)}
                                                     className={`cursor-pointer py-2 rounded-lg border-2 text-center text-sm transition-all ${selectedTime === time ? 'border-softPink bg-softPink text-black font-bold' : 'border-lightGrey text-charcoal hover:border-softPink'}`}>
                                                    {time}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="mt-8 flex justify-between">
                                    <button onClick={() => setStep(1)} className="text-gray-500 hover:text-black font-medium">
                                        <i className="fa-solid fa-arrow-left mr-2"></i> Back
                                    </button>
                                    <button disabled={!selectedDate || !selectedTime} onClick={() => setStep(3)} className="bg-black text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-charcoal transition disabled:opacity-50 disabled:cursor-not-allowed">
                                        Continue to Details <i className="fa-solid fa-arrow-right ml-2"></i>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 3: DETAILS & DEPOSIT */}
                        {step === 3 && (
                            <div className="fade-in grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div>
                                    <h3 className="text-2xl font-serif mb-6 text-black">Pet & Owner Details</h3>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Your Full Name" className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-softPink focus:ring-1 focus:ring-softPink" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="tel" placeholder="Phone Number" className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-softPink focus:ring-1 focus:ring-softPink" />
                                            <input type="email" placeholder="Email Address" className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-softPink focus:ring-1 focus:ring-softPink" />
                                        </div>
                                        <input type="text" placeholder="Pet's Name" className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-softPink focus:ring-1 focus:ring-softPink" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="text" placeholder="Breed" className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-softPink focus:ring-1 focus:ring-softPink" />
                                            <select className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-softPink focus:ring-1 focus:ring-softPink bg-white">
                                                <option>Small (0-20 lbs)</option>
                                                <option>Medium (21-50 lbs)</option>
                                                <option>Large (51-90 lbs)</option>
                                                <option>Giant (90+ lbs)</option>
                                            </select>
                                        </div>
                                    </div>

                                    <h3 className="text-xl font-serif mt-8 mb-4 text-black">Optional Spa Add-ons</h3>
                                    <div className="space-y-3">
                                        {addOns.map(addon => (
                                            <label key={addon.id} className="flex items-center space-x-3 cursor-pointer p-3 border border-gray-100 rounded-lg hover:bg-lightGrey">
                                                <input type="checkbox" checked={selectedAddOns.includes(addon.id)} onChange={() => handleAddOnToggle(addon.id)} className="form-checkbox h-5 w-5 text-softPink rounded focus:ring-softPink" />
                                                <span className="flex-1 text-charcoal">{addon.name}</span>
                                                <span className="font-semibold text-black">+${addon.price}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                                {/* Order Summary */}
                                <div className="bg-lightGrey p-6 rounded-xl border border-gray-200 h-fit">
                                    <h4 className="font-serif text-xl mb-4 border-b border-gray-300 pb-2">Booking Summary</h4>
                                    <div className="flex justify-between mb-2 text-sm text-charcoal">
                                        <span>Date & Time:</span>
                                        <span className="font-semibold text-black">{selectedDate} @ {selectedTime}</span>
                                    </div>
                                    <div className="flex justify-between mb-4 text-sm text-charcoal border-b border-gray-300 pb-4">
                                        <span>Location:</span>
                                        <span className="font-semibold text-black text-right w-48 truncate" title={bizInfo.address}>{bizInfo.address}</span>
                                    </div>
                                    
                                    <div className="flex justify-between mb-2">
                                        <span className="text-charcoal">{selectedService?.name}</span>
                                        <span className="font-semibold text-black">${selectedService?.price}</span>
                                    </div>
                                    {selectedAddOns.map(id => {
                                        const addon = addOns.find(a => a.id === id);
                                        return (
                                            <div key={id} className="flex justify-between mb-2 text-sm text-charcoal">
                                                <span>+ {addon.name}</span>
                                                <span>${addon.price}</span>
                                            </div>
                                        )
                                    })}
                                    
                                    <div className="border-t border-gray-300 mt-4 pt-4 flex justify-between items-center">
                                        <span className="font-bold text-lg text-black">Total Estimate</span>
                                        <span className="font-bold text-xl text-black">${calculateTotal()}</span>
                                    </div>
                                    
                                    <div className="bg-pink-50 text-pink-900 p-4 rounded-lg mt-6 text-sm border border-pink-100">
                                        <div className="flex justify-between font-bold mb-1">
                                            <span>Required Deposit (30%)</span>
                                            <span>${depositAmount}</span>
                                        </div>
                                        <p className="text-xs mt-1 opacity-80">Remaining balance due at pickup. Fully refundable up to 24 hours before appointment.</p>
                                    </div>

                                    <button onClick={() => { alert('In production, this processes the $' + depositAmount + ' deposit. Appointment confirmed!'); setStep(1); setSelectedService(null); setSelectedDate(null); setSelectedTime(null); setSelectedAddOns([]); }} 
                                        className="w-full bg-softPink text-black py-4 rounded-xl font-bold mt-6 shadow-md hover:bg-pink-300 transition transform hover:-translate-y-0.5 border border-pink-400">
                                        Pay Deposit & Confirm <i className="fa-solid fa-lock ml-2 text-xs"></i>
                                    </button>
                                    
                                    <div className="mt-6 flex justify-start">
                                        <button onClick={() => setStep(2)} className="text-gray-500 hover:text-black text-sm font-medium">
                                            <i className="fa-solid fa-arrow-left mr-1"></i> Back to Schedule
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Home = ({ setView }) => (
            <div className="fade-in">
                {/* HERO */}
                <header className="relative bg-black">
                    <div className="absolute inset-0">
                        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&q=80&w=2000" alt="Luxury Dog Grooming" className="w-full h-full object-cover opacity-50 grayscale hover:grayscale-0 transition duration-1000" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    </div>
                    <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-32 md:py-48 flex flex-col items-center text-center">
                        <span className="bg-softPink text-black px-4 py-1 rounded-full font-semibold tracking-widest uppercase mb-6 text-xs md:text-sm shadow-sm">Jacksonville's Premier Pet Spa</span>
                        <h1 className="text-5xl md:text-7xl font-serif font-bold text-white mb-6 leading-tight drop-shadow-lg">
                            Luxury Grooming for <br/>Pets That Deserve the Best
                        </h1>
                        <p className="text-lg md:text-xl text-lightGrey mb-10 max-w-2xl drop-shadow">
                            Experience a stress-free, exceptionally clean, and family-friendly spa day for your furry companion. Safety and premium care guaranteed.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={() => setView('booking')} className="bg-softPink text-black px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-300 transition shadow-xl transform hover:-translate-y-1">
                                Book Appointment
                            </button>
                            <button onClick={() => setView('services')} className="bg-transparent border-2 border-white text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-white hover:text-black transition">
                                View Services
                            </button>
                        </div>
                    </div>
                </header>

                {/* TRUST BAR */}
                <div className="bg-white border-b border-gray-200 py-8">
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-6 text-center divide-x divide-gray-100">
                        <div><i className="fa-solid fa-shield-dog text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">Safe & Certified</p></div>
                        <div><i className="fa-solid fa-heart text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">Stress-Free Care</p></div>
                        <div><i className="fa-solid fa-star text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">100+ Happy Clients</p></div>
                        <div><i className="fa-solid fa-spray-can-sparkles text-softPink text-3xl mb-3 drop-shadow-sm"></i><p className="font-semibold text-black">Premium Products</p></div>
                    </div>
                </div>

                {/* HOW IT WORKS */}
                <section className="py-24 bg-lightGrey">
                    <div className="max-w-7xl mx-auto px-4 text-center">
                        <h2 className="text-4xl font-serif font-bold text-black mb-16">Effortless Booking in 3 Steps</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                            <div className="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition">
                                <div className="w-16 h-16 bg-pink-50 text-softPink rounded-full flex items-center justify-center text-2xl mx-auto mb-6 font-bold border border-pink-100">1</div>
                                <h3 className="text-xl font-bold mb-3 text-black">Choose Service</h3>
                                <p className="text-charcoal">Select from our range of premium grooming and spa treatments tailored to your pet.</p>
                            </div>
                            <div className="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition">
                                <div className="w-16 h-16 bg-pink-50 text-softPink rounded-full flex items-center justify-center text-2xl mx-auto mb-6 font-bold border border-pink-100">2</div>
                                <h3 className="text-xl font-bold mb-3 text-black">Pick Date & Time</h3>
                                <p className="text-charcoal">Find a convenient 15-minute slot window in our live calendar and secure it easily.</p>
                            </div>
                            <div className="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition">
                                <div className="w-16 h-16 bg-pink-50 text-softPink rounded-full flex items-center justify-center text-2xl mx-auto mb-6 font-bold border border-pink-100">3</div>
                                <h3 className="text-xl font-bold mb-3 text-black">Drop Off & Relax</h3>
                                <p className="text-charcoal">Bring your pet to our San Jose Blvd spa. We'll text you the moment they are ready!</p>
                            </div>
                        </div>
                        <button onClick={() => setView('booking')} className="mt-16 bg-black text-white px-10 py-4 rounded-full font-bold hover:bg-charcoal transition shadow-lg text-lg">
                            Start Booking Now
                        </button>
                    </div>
                </section>

                {/* TESTIMONIALS */}
                <section className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-serif font-bold text-black mb-4">Loved by Jacksonville Pets</h2>
                            <p className="text-charcoal text-lg">Don't just take our word for it. Read what our furry clients' parents say.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {[ 
                                { name: "Sarah M.", pet: "Luna (Golden Retriever)", review: "Absolutely phenomenal! Luna usually hates the groomer, but she came out tail wagging and smelling like a dream. Highly recommend the de-shedding treatment!" },
                                { name: "James T.", pet: "Buster (Frenchie)", review: "The luxury facility on San Jose is incredibly clean and the staff is so gentle. The booking system is a breeze. Best pet spa in Jacksonville, hands down." },

                                    <p className="text-charcoal italic mb-6">"{review.review}"</p>

                    <main className="flex-grow">
                        {view === 'home' && <Home setView={setView} />}
                        {view === 'booking' && <BookingSystem />}
